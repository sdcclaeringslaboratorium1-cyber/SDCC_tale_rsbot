<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikromedicinsk Escape Room - Hvad er der galt med Mogens?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Hovedscene -->
        <div id="mainView" class="view-container active">
            <div class="scene-header">
                <h1 id="mainTitle">Hvad er der galt med Mogens?</h1>
            </div>
            
            <div class="scene-content">
                <!-- Infoboks venstre side -->
                <div class="info-panel">
                    <div class="info-content">
                        <h3>Kontekst</h3>
                        <p id="infoText">Klik på de forskellige områder på Mogens for at udforske og finde ud af, hvad der er galt.</p>
                    </div>
                </div>
                
                <!-- Hovedbillede med hotspots -->
                <div class="image-container">
                    <img id="mainBackground" src="images/mogens_base.png" alt="Mogens - patient" class="scene-image">
                    
                    <!-- Hotspots vil blive dynamisk tilføjet her -->
                    <div id="hotspotsContainer" class="hotspots-container">
                        <!-- Hotspots genereres via JavaScript -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Popup Modal -->
        <div id="popupModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 id="modalTitle">Organ Detaljer</h1>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                
                <div class="modal-body">
                    <!-- Infoboks venstre side (25% bredde) -->
                    <div class="modal-info-panel">
                        <div class="modal-info-content">
                            <h3>Information</h3>
                            <p id="modalInfoText">Klik på de forskellige områder for at udforske yderligere.</p>
                        </div>
                    </div>
                    
                    <!-- Organ billede med hotspots (75% bredde) -->
                    <div class="modal-image-container">
                        <img id="modalBackground" src="" alt="Organ detaljer" class="modal-image">
                        
                        <!-- Hotspots i modal -->
                        <div id="modalHotspotsContainer" class="modal-hotspots-container">
                            <!-- Hotspots genereres via JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Loading indicator -->
        <div id="loadingIndicator" class="loading-indicator">
            <div class="loading-spinner"></div>
            <p>Indlæser...</p>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="data.json" type="application/json" id="escapeData"></script>
    <script src="script.js"></script>
</body>
</html>
